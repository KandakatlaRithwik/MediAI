version: "3.9"

services:
  # ----------------------------------------------------------------
  # PostgreSQL — persistent relational data (auth, patient history)
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: medical_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-medical_assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-medical_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - medical_net

  # ----------------------------------------------------------------
  # ChromaDB — vector store for RAG document embeddings
  # ----------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: medical_chromadb
    restart: unless-stopped
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_PORT: 8001
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - chromadb_data:/chroma/chroma
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - medical_net

  # ----------------------------------------------------------------
  # FastAPI backend
  # ----------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override specific values for the docker-compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-medical_assistant}
      CHROMA_DB_PATH: /app/chroma_db
      UPLOAD_DIR: /app/uploads
      LOG_DIR: /app/logs
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_chroma:/app/chroma_db
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - medical_net
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"

volumes:
  postgres_data:
  chromadb_data:
  backend_uploads:
  backend_logs:
  backend_chroma:

networks:
  medical_net:
    driver: bridge
